name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scripts:
    name: Bench Scripts (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m py_compile scripts/boot_and_idle.py
      - run: node --check scripts/grid_scroll.mjs
      - run: bash -n scripts/run-all.sh

  rust:
    name: Rust Harness (fmt + clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/read_first_page
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "scripts/read_first_page -> target"
      - run: cargo fmt -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --all
